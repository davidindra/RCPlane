name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install MkDocs Material
        run: pip install mkdocs-material

      - name: Build documentation
        run: mkdocs build

      - name: Install OpenSCAD and Xvfb
        run: sudo apt-get install -y openscad xvfb

      - name: Install PDF generation dependencies
        run: pip install Pillow reportlab

      - name: Generate PDF catalogs
        run: bash models/build_pdf.sh
        continue-on-error: true

      - name: Copy viewer into site
        run: cp -r viewer site/viewer

      - name: Copy models into site
        run: cp -r models site/models

      - name: Generate model directory indexes
        run: python scripts/generate_model_index.py site/models

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
